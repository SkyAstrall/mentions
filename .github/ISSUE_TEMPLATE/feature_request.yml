name: Feature Request
description: Suggest a feature
labels: ["enhancement"]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues and discussions
          required: true
        - label: I have read the README and API docs
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: Describe a real-world scenario where you need this.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Include a code example if possible.
    validations:
      required: true
  - type: textarea
    id: prior_art
    attributes:
      label: Prior art
      description: Does another library handle this well? Link to examples.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternatives you have tried?
