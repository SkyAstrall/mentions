name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: input
    id: reproduction
    attributes:
      label: Reproduction link
      description: StackBlitz or CodeSandbox link with a minimal reproduction.
      placeholder: "https://stackblitz.com/edit/..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: react
    attributes:
      label: React version
      placeholder: "19.0.0"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "Chrome 130 / macOS 15"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or videos
      description: If applicable, add screenshots or screen recordings.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help.
